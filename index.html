<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiceLog — Fleet Maintenance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f12; --bg2: #141619; --bg3: #1a1d22; --panel: #1e2128;
      --border: #2a2e38; --border2: #353a47; --amber: #f5a623; --amber-dim: #c47e0e;
      --red: #e8402a; --green: #3dba6f; --text: #d4d8e2; --text-dim: #7a8099;
      --text-bright: #eef0f5;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; max-width: 1200px; margin: 0 auto; width: 100%; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); flex-shrink:0; gap:12px; }
    .topbar-brand { display:flex; align-items:baseline; gap:10px; }
    .topbar-eyebrow { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--amber); text-transform:uppercase; }
    .topbar-title { font-family:'Rajdhani',sans-serif; font-size:26px; font-weight:700; color:var(--text-bright); letter-spacing:1px; line-height:1; }
    .topbar-title span { color:var(--amber); }
    .topbar-stats { display:flex; gap:20px; }
    .ts-item { text-align:center; }
    .ts-val { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; color:var(--amber); line-height:1; }
    .ts-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; }
    .layout { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:240px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; background:var(--bg2); }
    .sidebar-hdr { padding:12px 14px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .sidebar-lbl { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
    .sidebar-list { overflow-y:auto; flex:1; padding:6px 0; }
    .si { display:flex; align-items:center; gap:10px; padding:9px 14px; cursor:pointer; transition:background .12s; border-left:3px solid transparent; }
    .si:hover { background:var(--bg3); }
    .si.active { background:rgba(245,166,35,.08); border-left-color:var(--amber); }
    .si-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
    .si-info { flex:1; min-width:0; }
    .si-name { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; color:var(--text-bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; }
    .si.active .si-name { color:var(--amber); }
    .si-sub { font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .si-count { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); background:var(--bg3); padding:1px 6px; border-radius:10px; flex-shrink:0; }
    .si.active .si-count { background:rgba(245,166,35,.15); color:var(--amber); }
    .sidebar-div { height:1px; background:var(--border); margin:6px 0; }
    .sidebar-search { padding:8px 10px; flex-shrink:0; border-bottom:1px solid var(--border); }
    .sidebar-search input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:4px; padding:6px 10px; color:var(--text-bright); font-family:'Barlow',sans-serif; font-size:13px; outline:none; }
    .sidebar-search input:focus { border-color:var(--amber); }
    .sidebar-search input::placeholder { color:var(--text-dim); }
    .sr-part { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--amber); background:rgba(245,166,35,.08); padding:2px 7px; border-radius:3px; border:1px solid rgba(245,166,35,.2); }
    .sidebar-add { margin:8px 10px 10px; padding:8px; border:1px dashed var(--border2); border-radius:4px; background:none; color:var(--text-dim); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition:border-color .15s,color .15s; flex-shrink:0; }
    .sidebar-add:hover { border-color:var(--amber); color:var(--amber); }
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .main-content { flex:1; overflow-y:auto; padding:24px; }
    .overview-title { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--text-bright); margin-bottom:4px; }
    .overview-sub { font-size:13px; color:var(--text-dim); margin-bottom:20px; }
    .summary-bar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .summary-stat { background:var(--panel); border:1px solid var(--border); border-radius:4px; padding:10px 16px; flex:1; min-width:90px; }
    .summary-stat-val { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--amber); line-height:1; }
    .summary-stat-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; margin-top:3px; }
    .fleet-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:14px; }
    .vehicle-card { background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:18px; cursor:pointer; transition:border-color .15s,transform .1s; position:relative; overflow:hidden; }
    .vehicle-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--amber); opacity:0; transition:opacity .15s; }
    .vehicle-card:hover { border-color:var(--border2); transform:translateY(-2px); }
    .vehicle-card:hover::before { opacity:1; }
    .vc-type { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--amber); text-transform:uppercase; margin-bottom:5px; }
    .vc-name { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; color:var(--text-bright); margin-bottom:3px; }
    .vc-sub { font-size:12px; color:var(--text-dim); margin-bottom:12px; }
    .vc-meta { display:flex; gap:14px; flex-wrap:wrap; }
    .vc-stat { display:flex; flex-direction:column; gap:1px; }
    .vc-stat-lbl { font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); font-family:'Share Tech Mono',monospace; }
    .vc-stat-val { font-size:14px; font-weight:600; color:var(--text); }
    .vc-last { margin-top:10px; font-size:11px; color:var(--text-dim); }
    .vic { background:var(--panel); border:1px solid var(--border); border-radius:6px; margin-bottom:20px; overflow:hidden; }
    .vic-top { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 20px 14px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .vic-identity { display:flex; align-items:center; gap:14px; }
    .vic-icon-wrap { width:48px; height:48px; border-radius:6px; background:rgba(245,166,35,.1); border:1px solid rgba(245,166,35,.25); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
    .vic-vname { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--text-bright); line-height:1; margin-bottom:3px; }
    .vic-badge { display:inline-block; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--amber); background:rgba(245,166,35,.1); padding:2px 8px; border-radius:3px; }
    .vic-actions { display:flex; gap:8px; flex-shrink:0; }
    .vic-specs { display:grid; grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); }
    .vic-spec { padding:12px 18px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
    .vic-spec:last-child { border-right:none; }
    .vic-spec-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); margin-bottom:4px; }
    .vic-spec-val { font-size:14px; font-weight:600; color:var(--text-bright); font-family:'Rajdhani',sans-serif; }
    .vic-notes { padding:10px 18px; font-size:13px; color:var(--text-dim); font-style:italic; border-top:1px solid var(--border); }
    .service-list { display:flex; flex-direction:column; gap:10px; }
    .sr { background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--amber-dim); border-radius:4px; padding:14px 18px; display:grid; grid-template-columns:56px 1fr minmax(120px,180px) auto; gap:14px; align-items:start; transition:border-color .15s; }
    .sr:hover { border-left-color:var(--amber); }
    .sr-date { text-align:center; }
    .sr-day { font-family:'Rajdhani',sans-serif; font-size:24px; font-weight:700; color:var(--amber); line-height:1; }
    .sr-mon { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; color:var(--text-dim); text-transform:uppercase; }
    .sr-yr { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); }
    .sr-type { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; color:var(--text-bright); margin-bottom:3px; }
    .sr-notes { font-size:13px; color:var(--text-dim); line-height:1.4; margin-bottom:6px; }
    .sr-partcol { display:flex; flex-direction:column; gap:4px; padding-top:2px; }
    .sr-partcol-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); margin-bottom:2px; }
    .sr-partcol-val { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--amber); word-break:break-word; line-height:1.4; }
    .sr-tags { display:flex; gap:6px; flex-wrap:wrap; }
    .sr-tag { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); background:var(--bg3); padding:2px 7px; border-radius:3px; }
    .sr-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
    .sr-cost { font-family:'Share Tech Mono',monospace; font-size:14px; color:var(--green); }
    .empty { text-align:center; padding:60px 20px; color:var(--text-dim); }
    .empty-icon { font-size:44px; margin-bottom:12px; }
    .empty-title { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:600; margin-bottom:6px; color:var(--text); }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:4px; font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; letter-spacing:.5px; cursor:pointer; border:none; transition:background .15s; }
    .btn-primary { background:var(--amber); color:#0d0f12; }
    .btn-primary:hover { background:#f0b84e; }
    .btn-ghost { background:var(--bg3); color:var(--text); border:1px solid var(--border2); }
    .btn-ghost:hover { border-color:var(--amber); color:var(--amber); }
    .btn-danger { background:rgba(232,64,42,.15); color:var(--red); border:1px solid rgba(232,64,42,.3); }
    .btn-danger:hover { background:rgba(232,64,42,.25); }
    .btn-sm { padding:4px 10px; font-size:12px; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal { background:var(--bg2); border:1px solid var(--border2); border-radius:8px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }
    .modal-hdr { padding:18px 22px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-family:'Rajdhani',sans-serif; font-size:19px; font-weight:700; color:var(--text-bright); }
    .modal-close { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:20px; line-height:1; padding:4px; }
    .modal-close:hover { color:var(--text-bright); }
    .modal-body { padding:18px 22px; display:flex; flex-direction:column; gap:14px; }
    .modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-full { grid-column:1/-1; }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-lbl { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); }
    .form-input, .form-select, .form-textarea { background:var(--bg3); border:1px solid var(--border2); border-radius:4px; padding:8px 11px; color:var(--text-bright); font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border-color .15s; width:100%; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--amber); }
    .form-select { appearance:none; cursor:pointer; }
    .form-textarea { resize:vertical; min-height:76px; }


    /* CUSTOMERS */
    .cust-item { display:flex; align-items:center; gap:10px; padding:9px 14px; cursor:pointer; transition:background .12s; border-left:3px solid transparent; }
    .cust-item:hover { background:var(--bg3); }
    .cust-item.active { background:rgba(245,166,35,.08); border-left-color:var(--amber); }
    .cust-icon { font-size:14px; width:20px; text-align:center; flex-shrink:0; }
    .cust-name { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; color:var(--text-bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; flex:1; min-width:0; }
    .cust-item.active .cust-name { color:var(--amber); }
    .cust-count { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); background:var(--bg3); padding:1px 6px; border-radius:10px; flex-shrink:0; }
    .cust-item.active .cust-count { background:rgba(245,166,35,.15); color:var(--amber); }
    .sidebar-section-hdr { padding:6px 14px 4px; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); margin-top:4px; }
    .cust-modal-actions { display:flex; gap:8px; }
    .back-cust-btn { background:none; border:none; color:var(--amber); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; cursor:pointer; padding:0; letter-spacing:0.5px; transition:color .15s; }
    .back-cust-btn:hover { color:#f0b84e; }
    /* REPORT */
    .report-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:flex-end; }
    .report-field { display:flex; flex-direction:column; gap:5px; flex:1; min-width:140px; }
    .report-field label { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); }
    .report-field input, .report-field select { background:var(--bg3); border:1px solid var(--border2); border-radius:4px; padding:8px 11px; color:var(--text-bright); font-family:'Barlow',sans-serif; font-size:13px; outline:none; transition:border-color .15s; width:100%; }
    .report-field input:focus, .report-field select:focus { border-color:var(--amber); }
    .report-field select { appearance:none; cursor:pointer; }
    .report-clear { background:var(--bg3); color:var(--text-dim); border:1px solid var(--border2); border-radius:4px; padding:8px 14px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; cursor:pointer; align-self:flex-end; white-space:nowrap; }
    .report-clear:hover { border-color:var(--amber); color:var(--amber); }
    .report-summary { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .report-stat { background:var(--panel); border:1px solid var(--border); border-radius:4px; padding:8px 14px; }
    .report-stat-val { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; color:var(--amber); line-height:1; }
    .report-stat-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; margin-top:3px; }
    .report-table { width:100%; border-collapse:collapse; font-size:13px; }
    .report-table th { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); padding:8px 12px; text-align:left; border-bottom:1px solid var(--border2); background:var(--bg2); position:sticky; top:0; }
    .report-table td { padding:10px 12px; border-bottom:1px solid var(--border); color:var(--text); vertical-align:top; }
    .report-table tr:hover td { background:rgba(255,255,255,.02); }
    .report-table .td-vehicle { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; color:var(--text-bright); cursor:pointer; }
    .report-table .td-vehicle:hover { color:var(--amber); }
    .report-table .td-date { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-dim); white-space:nowrap; }
    .report-table .td-type { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--amber); }
    .report-table .td-part { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--amber); }
    .report-table .td-cost { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--green); text-align:right; }
    .report-table .td-notes { font-size:12px; color:var(--text-dim); max-width:320px; }
    .tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:0; flex-shrink:0; }
    .tab-btn { padding:10px 20px; font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; color:var(--text-dim); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s, border-color .15s; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--amber); border-bottom-color:var(--amber); }
    .report-empty { text-align:center; padding:60px 20px; color:var(--text-dim); }
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
    /* PHOTO */
    .si-thumb { width:32px; height:32px; border-radius:4px; object-fit:cover; flex-shrink:0; border:1px solid var(--border2); }
    .si.active .si-thumb { border-color:var(--amber); }
    .si-icon { font-size:15px; width:32px; height:32px; text-align:center; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .vc-photo { width:100%; height:120px; object-fit:cover; display:block; }
    .vc-photo-placeholder { width:100%; height:80px; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:28px; }
    .vc-body { padding:14px 18px 18px; }
    .vic-photo-banner { width:100%; max-height:420px; object-fit:contain; display:block; background:var(--bg3); }
    .vic-photo-placeholder { width:100%; height:80px; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:36px; }
    .vic-icon-wrap img { width:100%; height:100%; object-fit:cover; border-radius:6px; }
    .photo-upload-area { border:2px dashed var(--border2); border-radius:6px; padding:20px; text-align:center; cursor:pointer; transition:border-color .15s; position:relative; }
    .photo-upload-area:hover { border-color:var(--amber); }
    .photo-upload-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .photo-preview { width:100%; height:160px; object-fit:cover; border-radius:4px; display:block; margin-bottom:8px; }
    .photo-upload-lbl { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); }
    .photo-remove { background:rgba(232,64,42,.15); color:var(--red); border:1px solid rgba(232,64,42,.3); border-radius:4px; padding:4px 10px; font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:700; cursor:pointer; margin-top:6px; }

    @media print {
      .topbar, .tab-bar, .sidebar, .report-bar, .report-clear, .no-print { display:none !important; }
      body { background:#fff !important; color:#000 !important; }
      .main { overflow:visible !important; }
      .main-content { padding:0 !important; overflow:visible !important; }
      .layout { display:block !important; }
      .report-summary { margin-bottom:14px; }
      .report-stat { background:#f5f5f5 !important; border:1px solid #ddd !important; }
      .report-stat-val { color:#c47e0e !important; }
      .report-stat-lbl { color:#666 !important; }
      .report-table th { background:#f0f0f0 !important; color:#444 !important; border-bottom:2px solid #ccc !important; }
      .report-table td { border-bottom:1px solid #eee !important; color:#222 !important; }
      .report-table .td-vehicle { color:#000 !important; }
      .report-table .td-type { color:#c47e0e !important; }
      .report-table .td-part { color:#c47e0e !important; }
      .report-table .td-cost { color:#2a7a4b !important; }
      .report-table .td-notes { color:#555 !important; }
      .print-header { display:block !important; }
      @page { margin:1.5cm; }
    }
    .print-header { display:none; margin-bottom:16px; }
    .print-header h1 { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:#000; }
    .print-header p { font-size:12px; color:#555; margin-top:4px; }
    @media (max-width:640px) { .sidebar { width:200px; } .topbar-stats { display:none; } .sr { grid-template-columns:1fr auto; } .sr-date { display:none; } .sr-partcol { display:none; } .form-row { grid-template-columns:1fr; } }
    @media (max-width:480px) { .sidebar { display:none; } .main-content { padding:16px; } }
  </style>
</head>
<body>
  <div id="app"></div>

    function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

    function fmtDate(iso) {
      const d = new Date(iso+"T00:00:00");
      return {day:d.getDate().toString().padStart(2,'0'), mon:d.toLocaleString('en',{month:'short'}).toUpperCase(), yr:d.getFullYear()};
    }

    // Migrate old separate photo store into vehicle objects
    function migrateCustomers(d) {
      // Add default customer if none exist
      if (!d.customers || d.customers.length === 0) {
        const defaultCust = {id:'cust_mattson', name:'Mattson Bros', notes:'Default fleet'};
        d.customers = [defaultCust];
        // Assign all vehicles to default customer
        d.vehicles = d.vehicles.map(v => v.customerId ? v : {...v, customerId:'cust_mattson'});
      }
      return d;
    }

    function migratePhotos(d) {
      try {
        const old = JSON.parse(localStorage.getItem("svc_photos_v1"));
        if (old && typeof old === "object") {
          d.vehicles = d.vehicles.map(v => old[v.id] ? {...v, photo: old[v.id]} : v);
          localStorage.removeItem("svc_photos_v1");
          saveData(d);
        }
      } catch(e) {}
      return d;
    }
    function compressImage(file, maxW, maxH, quality) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          let w=img.width, h=img.height;
          if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
          if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
          const canvas=document.createElement('canvas');
          canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL('image/jpeg',quality));
        };
        img.src=url;
      });
    }

          <div class="modal-body">
            <div class="form-row">
              <div class="form-group form-full"><label class="form-lbl">Name / Nickname *</label><input id="f-name" class="form-input" value="${esc(v?.name||'')}" placeholder="e.g. JD 9620R" /></div>
              <div class="form-group"><label class="form-lbl">Type</label><select id="f-type" class="form-select">${EQUIPMENT_TYPES.map(t=>`<option value="${t}"${(v?.type||'Tractor')===t?' selected':''}>${t}</option>`).join('')}</select></div>
              <div class="form-group"><label class="form-lbl">Customer</label><select id="f-custid" class="form-select">${(data.customers||[]).map(c=>`<option value="${esc(c.id)}"${(v?.customerId||selectedCustomerId)===c.id?' selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
              <div class="form-group"><label class="form-lbl">Year</label><input id="f-year" class="form-input" value="${esc(v?.year||'')}" placeholder="2021" /></div>
              <div class="form-group"><label class="form-lbl">Make</label><input id="f-make" class="form-input" value="${esc(v?.make||'')}" placeholder="John Deere" /></div>
              <div class="form-group"><label class="form-lbl">Model</label><input id="f-model" class="form-input" value="${esc(v?.model||'')}" placeholder="9620R" /></div>
              <div class="form-group"><label class="form-lbl">VIN / Serial</label><input id="f-vin" class="form-input" value="${esc(v?.vin||'')}" placeholder="Optional" /></div>
              <div class="form-group"><label class="form-lbl">Current Hours / Miles</label><input id="f-hours" type="number" class="form-input" value="${esc(v?.hours||'')}" placeholder="0" /></div>
              <div class="form-group form-full"><label class="form-lbl">Notes</label><textarea id="f-notes" class="form-textarea" placeholder="Additional notes...">${esc(v?.notes||'')}</textarea></div>
              <div class="form-group form-full">
                <label class="form-lbl">Photo</label>
                ${(()=>{
                  const p = pendingPhoto !== undefined ? pendingPhoto : (v ? (v.photo||null) : null);
                  if(p) return `<img class="photo-preview" src="${p}" alt="Preview" />
                    <div style="display:flex;gap:8px;margin-top:4px">
                      <button class="photo-upload-area btn-ghost" style="flex:1;padding:10px;cursor:pointer;border:1px solid var(--border2)" data-action="pick-photo">
                        <span class="photo-upload-lbl">Change Photo</span>
                      </button>
                      <button class="photo-remove" data-action="remove-photo">Remove</button>
                    </div>`;
                  return `<button class="photo-upload-area" style="width:100%;cursor:pointer;background:none" data-action="pick-photo">
                    <div style="font-size:28px;margin-bottom:8px">📷</div>
                    <div class="photo-upload-lbl">Click to upload a photo</div>
                  </button>`;
                })()}
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button class="btn btn-primary" data-action="save-vehicle">${v?'Save Changes':'Add Equipment'}</button>
          </div>
        </div>
      </div>`;
    }

    function recordModalHTML(r) {
      const today = new Date().toISOString().slice(0,10);
      return `<div class="modal-overlay" id="modal-bg">
        <div class="modal">
          <div class="modal-hdr">
            <div class="modal-title">${r?'Edit Service Record':'Log Service'}</div>
            <button class="modal-close" data-action="close-modal">✕</button>
          </div>
          <div class="modal-body">
            <div class="form-row">
              <div class="form-group"><label class="form-lbl">Date *</label><input id="f-date" type="date" class="form-input" value="${esc(r?.date||today)}" /></div>
              <div class="form-group"><label class="form-lbl">Service Type *</label><select id="f-type" class="form-select">${SERVICE_TYPES.map(t=>`<option value="${t}"${(r?.type||'Oil Change')===t?' selected':''}>${t}</option>`).join('')}</select></div>
              <div class="form-group"><label class="form-lbl">Cost ($)</label><input id="f-cost" type="number" class="form-input" value="${esc(r?.cost||'')}" placeholder="0.00" /></div>
              <div class="form-group"><label class="form-lbl">Hours / Miles at Service</label><input id="f-hours" type="number" class="form-input" value="${esc(r?.hours||'')}" placeholder="0" /></div>
              <div class="form-group"><label class="form-lbl">Performed By</label><input id="f-tech" class="form-input" value="${esc(r?.tech||'')}" placeholder="Self, Dealer, Shop..." /></div>
              <div class="form-group"><label class="form-lbl">Part #</label><input id="f-partnum" class="form-input" value="${esc(r?.partnum||'')}" placeholder="Part number..." /></div>
              <div class="form-group form-full"><label class="form-lbl">Notes / Parts Used</label><textarea id="f-notes" class="form-textarea" placeholder="Work done, parts replaced...">${esc(r?.notes||'')}</textarea></div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button class="btn btn-primary" data-action="save-record">${r?'Save Changes':'Log Service'}</button>
          </div>
        </div>
      </div>`;
    }


    function renderReport() {
      const {year, equipment, partnum, make, keyword, customer} = reportFilters;
      let results = data.records.map(r => {
        const v = data.vehicles.find(v=>v.id===r.vehicleId)||{name:'Unknown',make:'',year:'',type:''};
        return {...r, _v: v};
      });
      if (year)      results = results.filter(r => r.date && r.date.startsWith(year));
      if (equipment) results = results.filter(r => r._v.name.toLowerCase().includes(equipment.toLowerCase()));
      if (partnum)   results = results.filter(r => (r.partnum||'').toLowerCase().includes(partnum.toLowerCase()) || (r.notes||'').toLowerCase().includes(partnum.toLowerCase()));
      if (make)      results = results.filter(r => r._v.make.toLowerCase().includes(make.toLowerCase()));
      if (keyword)   results = results.filter(r => [r.notes||'', r.type||'', r.tech||'', r.partnum||'', r._v.name||''].join(' ').toLowerCase().includes(keyword.toLowerCase()));
      if (customer)  results = results.filter(r => r._v.customerId === customer);
      results.sort((a,b) => b.date.localeCompare(a.date));

      const totalCostR = results.reduce((s,r)=>s+(parseFloat(r.cost)||0),0);
      const uniqueVehicles = new Set(results.map(r=>r.vehicleId)).size;

      // Get unique years for dropdown
      const years = [...new Set(data.records.map(r=>r.date?r.date.slice(0,4):null).filter(Boolean))].sort((a,b)=>b-a);
      const makes = [...new Set(data.vehicles.map(v=>v.make).filter(Boolean))].sort();

      return `
        <div class="overview-title">Service Report</div>
        <div class="report-bar">
          <div class="report-field">
            <label>Customer</label>
            <select id="rf-customer" data-action="report-filter" data-field="customer">
              <option value="">All Customers</option>
              ${(data.customers||[]).map(c=>`<option value="${esc(c.id)}"${reportFilters.customer===c.id?' selected':''}>${esc(c.name)}</option>`).join('')}
            </select>
          </div>
          <div class="report-field">
            <label>Year</label>
            <select id="rf-year" data-action="report-filter" data-field="year">
              <option value="">All Years</option>
              ${years.map(y=>`<option value="${y}"${reportFilters.year===y?' selected':''}>${y}</option>`).join('')}
            </select>
          </div>
          <div class="report-field">
            <label>Equipment</label>
            <input id="rf-equipment" type="text" placeholder="Search equipment..." value="${esc(equipment)}" data-action="report-input" data-field="equipment" />
          </div>
          <div class="report-field">
            <label>Part #</label>
            <input id="rf-partnum" type="text" placeholder="Part number..." value="${esc(partnum)}" data-action="report-input" data-field="partnum" />
          </div>
          <div class="report-field">
            <label>Make</label>
            <select id="rf-make" data-action="report-filter" data-field="make">
              <option value="">All Makes</option>
              ${makes.map(m=>`<option value="${m}"${reportFilters.make===m?' selected':''}>${esc(m)}</option>`).join('')}
            </select>
          </div>
          <div class="report-field">
            <label>Keyword</label>
            <input id="rf-keyword" type="text" placeholder="Search all fields..." value="${esc(keyword)}" data-action="report-input" data-field="keyword" />
          </div>
          <button class="report-clear" data-action="report-clear">Clear</button>
          <button class="report-clear no-print" data-action="report-print" style="background:var(--amber);color:#0d0f12;border-color:var(--amber)">🖨 Print</button>
        </div>
        <div class="print-header">
          <h1>Mattson Bros — Service Report</h1>
          <p>Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}
          ${year?' · Year: '+year:''}${make?' · Make: '+esc(make):''}${equipment?' · Equipment: '+esc(equipment):''}${partnum?' · Part #: '+esc(partnum):''}${keyword?' · Keyword: '+esc(keyword):''}</p>
        </div>
        <div class="report-summary">
          <div class="report-stat"><div class="report-stat-val">${results.length}</div><div class="report-stat-lbl">Records</div></div>
          <div class="report-stat"><div class="report-stat-val">${uniqueVehicles}</div><div class="report-stat-lbl">Equipment</div></div>
          <div class="report-stat"><div class="report-stat-val">$${totalCostR.toLocaleString()}</div><div class="report-stat-lbl">Total Cost</div></div>
        </div>
        ${results.length === 0 ? `<div class="report-empty">
          <div style="font-size:40px;margin-bottom:12px">🔍</div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:600;color:var(--text);margin-bottom:6px">No records found</div>
          <div style="font-size:14px">Try adjusting your search filters.</div>
        </div>` : `
        <div style="overflow-x:auto">
        <table class="report-table">
          <thead><tr>
            <th>Date</th>
            <th>Equipment</th>
            <th>Type</th>
            <th>Notes</th>
            <th>Part #</th>
            <th>Tech</th>
            <th style="text-align:right">Cost</th>
          </tr></thead>
          <tbody>
            ${results.map(r=>`<tr>
              <td class="td-date">${r.date||''}</td>
              <td class="td-vehicle" data-action="select-from-report" data-id="${esc(r.vehicleId)}">${esc(r._v.name)}</td>
              <td class="td-type">${esc(r.type)}</td>
              <td class="td-notes">${esc((r.notes||'').slice(0,120))}</td>
              <td class="td-part">${r.partnum?esc(r.partnum):''}</td>
              <td style="font-size:12px;color:var(--text-dim)">${esc(r.tech||'')}</td>
              <td class="td-cost">${r.cost?'$'+Number(r.cost).toLocaleString():''}</td>
            </tr>`).join('')}
          </tbody>
        </table>
        </div>`}`;
    }

    function render() {
      const selected = data.vehicles.find(v=>v.id===selectedId)||null;
      const _selCust = (data.customers||[]).find(c=>c.id===selectedCustomerId)||null;
      const topBtn = selected
        ? `<button class="btn btn-primary" data-action="add-record">+ Log Service</button>`
        : _selCust
          ? `<button class="btn btn-primary" data-action="add-vehicle">+ Add Equipment</button>`
          : `<button class="btn btn-primary" data-action="add-customer">+ Add Customer</button>`;

      let modal = '';
      if (modalState) {
        if (modalState.type==='vehicle') modal = vehicleModalHTML(modalState.target);
        else if (modalState.type==='record') modal = recordModalHTML(modalState.target);
        else if (modalState.type==='customer') modal = customerModalHTML(modalState.target);
      }

      document.getElementById('app').innerHTML = `
        <div class="topbar">
          <div class="topbar-brand">
            <div class="topbar-eyebrow">⚙ Fleet</div>
            <div class="topbar-title">SERVICE<span>LOG</span></div>
          </div>
          <div class="topbar-stats">
            <div class="ts-item"><div class="ts-val">${(data.customers||[]).length}</div><div class="ts-lbl">Customers</div></div>
            <div class="ts-item"><div class="ts-val">${data.vehicles.length}</div><div class="ts-lbl">Equipment</div></div>
            <div class="ts-item"><div class="ts-val">${data.records.length}</div><div class="ts-lbl">Records</div></div>
          </div>
          ${topBtn}
        </div>
        <div class="tab-bar">
          <button class="tab-btn${appView==='fleet'?' active':''}" data-action="tab-fleet">Fleet</button>
          <button class="tab-btn${appView==='report'?' active':''}" data-action="tab-report">Report</button>
        </div>
        ${appView==='report'
          ? `<div class="main"><div class="main-content">${renderReport()}</div></div>`
          : `<div class="layout">
              ${renderSidebar()}
              <div class="main"><div class="main-content">${selected?renderDetail(selected):renderOverview()}</div></div>
             </div>`}
        ${modal}`;
    }

    document.getElementById('app').addEventListener('click', function(e) {
      // Handle search input live typing
      if (e.target.id === 'sidebar-search-input') return;
      const el = e.target.closest('[data-action]');
      if (!el) {
        if (e.target.id==='modal-bg') { modalState=null; pendingPhoto=undefined; render(); }
        return;
      }
      const action = el.dataset.action;
      const id = el.dataset.id;

      if (action==='back-to-customers') {
        selectedCustomerId=null; selectedId=null; sidebarSearch=''; render();
      } else if (action==='select-customer') {
        selectedCustomerId=id; selectedId=null; sidebarSearch=''; render();
      } else if (action==='add-customer') {
        modalState={type:'customer',target:null}; render();
      } else if (action==='edit-customer') {
        modalState={type:'customer',target:(data.customers||[]).find(c=>c.id===id)||null}; render();
      } else if (action==='del-customer') {
        const hasvehicles = data.vehicles.some(v=>v.customerId===id);
        if(hasvehicles && !confirm('This customer has equipment. Delete customer and all their vehicles and records?'))return;
        if(!hasvehicles && !confirm('Delete this customer?'))return;
        const vids = data.vehicles.filter(v=>v.customerId===id).map(v=>v.id);
        if(selectedCustomerId===id){selectedCustomerId=null;selectedId=null;}
        update({...data,
          customers:(data.customers||[]).filter(c=>c.id!==id),
          vehicles:data.vehicles.filter(v=>v.customerId!==id),
          records:data.records.filter(r=>!vids.includes(r.vehicleId))
        });
      } else if (action==='save-customer') {
        const cname = document.getElementById('f-cust-name').value.trim();
        if(!cname){alert('Name is required.');return;}
        const cnotes = document.getElementById('f-cust-notes').value;
        if(modalState.target) {
          update({...data,customers:(data.customers||[]).map(c=>c.id===modalState.target.id?{...modalState.target,name:cname,notes:cnotes}:c)});
        } else {
          const nc={id:uid(),name:cname,notes:cnotes};
          selectedCustomerId=nc.id;
          update({...data,customers:[...(data.customers||[]),nc]});
        }
        modalState=null; render();
      } else if (action==='tab-fleet') {
        appView='fleet'; render();
      } else if (action==='tab-report') {
        appView='report'; render();
      } else if (action==='report-print') {
        window.print();
      } else if (action==='report-clear') {
        reportFilters={year:'',equipment:'',partnum:'',make:'',keyword:'',customer:''}; render();
      } else if (action==='report-filter') {
        reportFilters[el.dataset.field] = el.value; render();
      } else if (action==='select-from-report') {
        appView='fleet'; selectedId=id; render();
      } else if (action==='sidebar-search') {
        // handled by input event
      } else if (action==='select') {
        selectedId = id||null; render();
      } else if (action==='add-vehicle') {
        pendingPhoto=undefined; modalState={type:'vehicle',target:null}; render();
      } else if (action==='edit-vehicle') {
        pendingPhoto=undefined; modalState={type:'vehicle',target:data.vehicles.find(v=>v.id===id)||null}; render();
      } else if (action==='pick-photo') {
        document.getElementById('global-photo-input').click();
      } else if (action==='remove-photo') {
        pendingPhoto=null; render();
      } else if (action==='del-vehicle') {
        if(!confirm('Delete this vehicle and all its service records?'))return;
        if(selectedId===id) selectedId=null;
        update({vehicles:data.vehicles.filter(v=>v.id!==id),records:data.records.filter(r=>r.vehicleId!==id)});
      } else if (action==='add-record') {
        modalState={type:'record',target:null}; render();
      } else if (action==='edit-record') {
        modalState={type:'record',target:data.records.find(r=>r.id===id)||null}; render();
      } else if (action==='del-record') {
        if(!confirm('Delete this service record?'))return;
        update({...data,records:data.records.filter(r=>r.id!==id)});
      } else if (action==='close-modal') {
        modalState=null; pendingPhoto=undefined; render();
      } else if (action==='save-vehicle') {
        const name = document.getElementById('f-name').value.trim();
        if(!name){alert('Name is required.');return;}
        const custEl = document.getElementById('f-custid');
        const form = {
          name, type:document.getElementById('f-type').value,
          year:document.getElementById('f-year').value,
          make:document.getElementById('f-make').value,
          model:document.getElementById('f-model').value,
          vin:document.getElementById('f-vin').value,
          hours:document.getElementById('f-hours').value,
          notes:document.getElementById('f-notes').value,
          customerId: custEl ? custEl.value : (selectedCustomerId || (data.customers||[])[0]?.id || ''),
        };
        let targetId = modalState.target?.id;
        // Determine final photo value
        const existingPhoto = modalState.target ? (modalState.target.photo||null) : null;
        const finalPhoto = pendingPhoto !== undefined ? pendingPhoto : existingPhoto;
        const formWithPhoto = finalPhoto ? {...form, photo: finalPhoto} : {...form};
        if(formWithPhoto.photo === null) delete formWithPhoto.photo;
        if(modalState.target) {
          update({...data,vehicles:data.vehicles.map(v=>v.id===targetId?{...modalState.target,...formWithPhoto}:v)});
        } else {
          const nv={id:uid(),...formWithPhoto};
          targetId=nv.id; selectedId=nv.id;
          update({...data,vehicles:[...data.vehicles,nv]});
        }
        // Photo is stored inside the vehicle object - already handled in update() above
        pendingPhoto=undefined;
        modalState=null; render();
      } else if (action==='save-record') {
        const date=document.getElementById('f-date').value;
        const type=document.getElementById('f-type').value;
        if(!date||!type){alert('Date and type are required.');return;}
        const partnumEl = document.getElementById('f-partnum');
        const form={date,type,
          cost:document.getElementById('f-cost').value,
          hours:document.getElementById('f-hours').value,
          tech:document.getElementById('f-tech').value,
          partnum:partnumEl ? partnumEl.value : '',
          notes:document.getElementById('f-notes').value,
        };
        let vehicles=data.vehicles;
        if(form.hours){
          const newHrs=parseFloat(form.hours);
          const veh=data.vehicles.find(v=>v.id===selectedId);
          if(veh&&newHrs>(parseFloat(veh.hours)||0))
            vehicles=data.vehicles.map(v=>v.id===selectedId?{...v,hours:String(newHrs)}:v);
        }
        if(modalState.target) {
          update({...data,vehicles:vehicles,records:data.records.map(r=>r.id===modalState.target.id?{...modalState.target,...form}:r)});
        } else {
          update({...data,vehicles:vehicles,records:[...data.records,{id:uid(),vehicleId:selectedId,...form}]});
        }
        modalState=null; render();
      }
    });

    render();

    // Sidebar search - use delegated input event on app
    document.getElementById('app').addEventListener('input', function(e) {
      if (e.target.dataset.action === 'report-input') {
        reportFilters[e.target.dataset.field] = e.target.value;
        render();
        // restore focus
        const el = document.querySelector('[data-field="'+e.target.dataset.field+'"]');
        if (el) { el.focus(); el.setSelectionRange && el.setSelectionRange(el.value.length, el.value.length); }
        return;
      }
      if (e.target.id === 'sidebar-search-input') {
        sidebarSearch = e.target.value;
        render();
        // Restore focus and cursor position
        const inp = document.getElementById('sidebar-search-input');
        if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
      }
    });

    // Global photo input handler
    document.getElementById('global-photo-input').addEventListener('change', function() {
      if (!this.files || !this.files[0]) return;
      var file = this.files[0];
      compressImage(file, 800, 600, 0.78).then(function(compressed) {
        pendingPhoto = compressed;
        render();
      });
      this.value = ''; // reset so same file can be picked again
    });
  </script>
</body>
</html>
