<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiceLog — Fleet Maintenance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f5; --bg2: #ffffff; --bg3: #e8eaed; --panel: #ffffff;
      --border: #d1d5db; --border2: #b8bec8; --amber: #d97706; --amber-dim: #b45309;
      --red: #dc2626; --green: #16a34a; --text: #374151; --text-dim: #6b7280;
      --text-bright: #111827;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; max-width: 1200px; margin: 0 auto; width: 100%; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); flex-shrink:0; gap:12px; background:#ffffff; }
    .topbar-brand { display:flex; align-items:baseline; gap:10px; }
    .topbar-eyebrow { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--amber); text-transform:uppercase; }
    .topbar-title { font-family:'Rajdhani',sans-serif; font-size:26px; font-weight:700; color:var(--text-bright); letter-spacing:1px; line-height:1; }
    .topbar-title span { color:var(--amber); }
    .topbar-stats { display:flex; gap:20px; }
    .ts-item { text-align:center; }
    .ts-val { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; color:var(--amber); line-height:1; }
    .ts-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; }
    .layout { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:240px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; background:#f8f9fa; }
    .sidebar-hdr { padding:12px 14px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .sidebar-lbl { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
    .sidebar-list { overflow-y:auto; flex:1; padding:6px 0; }
    .si { display:flex; align-items:center; gap:10px; padding:9px 14px; cursor:pointer; transition:background .12s; border-left:3px solid transparent; }
    .si:hover { background:#eef0f3; }
    .si.active { background:rgba(217,119,6,.1); border-left-color:var(--amber); }
    .si-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
    .si-info { flex:1; min-width:0; }
    .si-name { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; color:var(--text-bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; }
    .si.active .si-name { color:var(--amber); }
    .si-sub { font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .si-count { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); background:var(--bg3); padding:1px 6px; border-radius:10px; flex-shrink:0; }
    .si.active .si-count { background:rgba(217,119,6,.15); color:var(--amber); }
    .sidebar-div { height:1px; background:var(--border); margin:6px 0; }
    .sidebar-search { padding:8px 10px; flex-shrink:0; border-bottom:1px solid var(--border); }
    .sidebar-search input { width:100%; background:#ffffff; border:1px solid var(--border); border-radius:4px; padding:6px 10px; color:var(--text-bright); font-family:'Barlow',sans-serif; font-size:13px; outline:none; box-shadow:inset 0 1px 2px rgba(0,0,0,.05); }
    .sidebar-search input:focus { border-color:var(--amber); }
    .sidebar-search input::placeholder { color:var(--text-dim); }
    .sr-part { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--amber); background:rgba(245,166,35,.08); padding:2px 7px; border-radius:3px; border:1px solid rgba(245,166,35,.2); }
    .sidebar-add { margin:8px 10px 10px; padding:8px; border:1px dashed #b8bec8; border-radius:4px; background:none; color:var(--text-dim); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition:border-color .15s,color .15s; flex-shrink:0; }
    .sidebar-add:hover { border-color:var(--amber); color:var(--amber); }
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .main-content { flex:1; overflow-y:auto; padding:24px; }
    .overview-title { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--text-bright); margin-bottom:4px; }
    .overview-sub { font-size:13px; color:var(--text-dim); margin-bottom:20px; }
    .summary-bar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .summary-stat { background:var(--panel); border:1px solid var(--border); border-radius:4px; padding:10px 16px; flex:1; min-width:90px; }
    .summary-stat-val { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--amber); line-height:1; }
    .summary-stat-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; margin-top:3px; }
    .fleet-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:14px; }
    .vehicle-card { background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:18px; cursor:pointer; transition:border-color .15s,transform .1s; position:relative; overflow:hidden; }
    .vehicle-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--amber); opacity:0; transition:opacity .15s; }
    .vehicle-card:hover { border-color:#9ca3af; transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.08); }
    .vehicle-card:hover::before { opacity:1; }
    .vc-type { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--amber); text-transform:uppercase; margin-bottom:5px; }
    .vc-name { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; color:var(--text-bright); margin-bottom:3px; }
    .vc-sub { font-size:12px; color:var(--text-dim); margin-bottom:12px; }
    .vc-meta { display:flex; gap:14px; flex-wrap:wrap; }
    .vc-stat { display:flex; flex-direction:column; gap:1px; }
    .vc-stat-lbl { font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); font-family:'Share Tech Mono',monospace; }
    .vc-stat-val { font-size:14px; font-weight:600; color:var(--text); }
    .vc-last { margin-top:10px; font-size:11px; color:var(--text-dim); }
    .vic { background:var(--panel); border:1px solid var(--border); border-radius:6px; margin-bottom:20px; overflow:hidden; }
    .vic-top { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 20px 14px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .vic-identity { display:flex; align-items:center; gap:14px; }
    .vic-icon-wrap { width:48px; height:48px; border-radius:6px; background:rgba(245,166,35,.1); border:1px solid rgba(245,166,35,.25); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
    .vic-vname { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--text-bright); line-height:1; margin-bottom:3px; }
    .vic-badge { display:inline-block; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--amber-dim); background:rgba(217,119,6,.1); padding:2px 8px; border-radius:3px; }
    .vic-actions { display:flex; gap:8px; flex-shrink:0; }
    .vic-specs { display:grid; grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); }
    .vic-spec { padding:12px 18px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
    .vic-spec:last-child { border-right:none; }
    .vic-spec-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); margin-bottom:4px; }
    .vic-spec-val { font-size:14px; font-weight:600; color:var(--text-bright); font-family:'Rajdhani',sans-serif; }
    .vic-notes { padding:10px 18px; font-size:13px; color:var(--text-dim); font-style:italic; border-top:1px solid var(--border); }
    .service-list { display:flex; flex-direction:column; gap:10px; }
    .sr { background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--amber-dim); border-radius:4px; padding:14px 18px; display:grid; grid-template-columns:56px 1fr minmax(120px,180px) auto; gap:14px; align-items:start; transition:border-color .15s; }
    .sr:hover { border-left-color:var(--amber); }
    .sr-date { text-align:center; }
    .sr-day { font-family:'Rajdhani',sans-serif; font-size:24px; font-weight:700; color:var(--amber); line-height:1; }
    .sr-mon { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; color:var(--text-dim); text-transform:uppercase; }
    .sr-yr { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); }
    .sr-type { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; color:var(--text-bright); margin-bottom:3px; }
    .sr-notes { font-size:13px; color:var(--text-dim); line-height:1.4; margin-bottom:6px; }
    .sr-partcol { display:flex; flex-direction:column; gap:6px; padding-top:2px; }
    .sr-part-row { display:flex; flex-direction:column; gap:1px; }
    .parts-list { display:flex; flex-direction:column; gap:8px; }
    .part-inv-wrap { position:relative; flex:1; }
    .part-inv-dropdown { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--border); border-top:none; border-radius:0 0 4px 4px; z-index:200; max-height:180px; overflow-y:auto; box-shadow:0 4px 12px rgba(0,0,0,.1); }
    .part-inv-option { padding:8px 12px; cursor:pointer; border-bottom:1px solid var(--bg3); display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .part-inv-option:hover { background:rgba(217,119,6,.06); }
    .part-inv-option:last-child { border-bottom:none; }
    .part-inv-opt-name { font-size:13px; font-weight:600; color:var(--text-bright); }
    .part-inv-opt-num { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--amber-dim); }
    .part-inv-opt-meta { font-size:11px; color:var(--text-dim); }
    .part-inv-opt-qty { font-family:'Share Tech Mono',monospace; font-size:11px; padding:1px 6px; border-radius:10px; }
    .part-inv-opt-qty.ok { background:rgba(22,163,74,.1); color:#16a34a; }
    .part-inv-opt-qty.low { background:rgba(217,119,6,.1); color:#d97706; }
    .part-inv-opt-qty.none { background:rgba(220,38,38,.1); color:#dc2626; }
    .part-entry { display:grid; grid-template-columns:1fr 1fr 60px 90px auto; gap:8px; align-items:center; }
    .part-cost-val { font-family:'Share Tech Mono',monospace; font-size:11px; color:#16a34a; margin-top:1px; }
    .part-entry input { background:var(--bg3); border:1px solid var(--border2); border-radius:4px; padding:7px 10px; color:var(--text-bright); font-family:'Barlow',sans-serif; font-size:13px; outline:none; transition:border-color .15s; width:100%; }
    .part-entry input:focus { border-color:var(--amber); }
    .part-remove-btn { background:rgba(220,38,38,.1); border:1px solid rgba(220,38,38,.25); color:#dc2626; border-radius:4px; padding:6px 10px; cursor:pointer; font-size:14px; line-height:1; }
    .part-remove-btn:hover { background:rgba(220,38,38,.2); }
    .add-part-btn { background:none; border:1px dashed var(--border2); border-radius:4px; color:var(--text-dim); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; padding:7px 12px; cursor:pointer; transition:border-color .15s,color .15s; margin-top:2px; }
    .add-part-btn:hover { border-color:var(--amber); color:var(--amber); }
    .sr-partcol-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); margin-bottom:2px; }
    .sr-partcol-val { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--amber-dim); word-break:break-word; line-height:1.4; }
    .sr-tags { display:flex; gap:6px; flex-wrap:wrap; }
    .sr-tag { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); background:#e8eaed; padding:2px 7px; border-radius:3px; }
    .sr-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
    .sr-cost { font-family:'Share Tech Mono',monospace; font-size:14px; color:var(--green); }
    .empty { text-align:center; padding:60px 20px; color:var(--text-dim); }
    .empty-icon { font-size:44px; margin-bottom:12px; }
    .empty-title { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:600; margin-bottom:6px; color:var(--text); }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:4px; font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; letter-spacing:.5px; cursor:pointer; border:none; transition:background .15s; }
    .btn-primary { background:var(--amber); color:#0d0f12; }
    .btn-primary:hover { background:#f0b84e; }
    .btn-ghost { background:#ffffff; color:var(--text); border:1px solid var(--border); box-shadow:0 1px 2px rgba(0,0,0,.05); }
    .btn-ghost:hover { border-color:var(--amber); color:var(--amber); }
    .btn-danger { background:rgba(232,64,42,.15); color:var(--red); border:1px solid rgba(232,64,42,.3); }
    .btn-danger:hover { background:rgba(232,64,42,.25); }
    .btn-sm { padding:4px 10px; font-size:12px; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal { background:var(--bg2); border:1px solid var(--border2); border-radius:8px; width:100%; max-width:780px; max-height:92vh; overflow-y:auto; }
    .modal-hdr { padding:18px 22px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-family:'Rajdhani',sans-serif; font-size:19px; font-weight:700; color:var(--text-bright); }
    .modal-close { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:20px; line-height:1; padding:4px; }
    .modal-close:hover { color:var(--text-bright); }
    .modal-body { padding:18px 22px; display:flex; flex-direction:column; gap:14px; }
    .modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-full { grid-column:1/-1; }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-lbl { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); }
    .form-input, .form-select, .form-textarea { background:var(--bg3); border:1px solid var(--border2); border-radius:4px; padding:8px 11px; color:var(--text-bright); font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border-color .15s; width:100%; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--amber); }
    .form-select { appearance:none; cursor:pointer; }
    .form-textarea { resize:vertical; min-height:76px; }


    /* CUSTOMERS */
    .cust-item { display:flex; align-items:center; gap:10px; padding:9px 14px; cursor:pointer; transition:background .12s; border-left:3px solid transparent; }
    .cust-item:hover { background:#eef0f3; }
    .cust-item.active { background:rgba(217,119,6,.1); border-left-color:var(--amber); }
    .cust-icon { font-size:14px; width:20px; text-align:center; flex-shrink:0; }
    .cust-name { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; color:var(--text-bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; flex:1; min-width:0; }
    .cust-item.active .cust-name { color:var(--amber); }
    .cust-count { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); background:var(--bg3); padding:1px 6px; border-radius:10px; flex-shrink:0; }
    .cust-item.active .cust-count { background:rgba(245,166,35,.15); color:var(--amber); }
    .sidebar-section-hdr { padding:6px 14px 4px; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); margin-top:4px; }
    .cust-modal-actions { display:flex; gap:8px; }
    .back-cust-btn { background:none; border:none; color:var(--amber); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; cursor:pointer; padding:0; letter-spacing:0.5px; transition:color .15s; }
    .back-cust-btn:hover { color:#f0b84e; }

    /* INVOICES */
    .inv-list { display:flex; flex-direction:column; gap:10px; }
    .inv-card { background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:16px 20px; display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; }
    .inv-card:hover { border-color:var(--border2); }
    .inv-num { font-family:'Share Tech Mono',monospace; font-size:13px; color:var(--amber-dim); font-weight:700; }
    .inv-customer { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; color:var(--text-bright); }
    .inv-meta { font-size:12px; color:var(--text-dim); margin-top:2px; }
    .inv-status { display:inline-block; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border-radius:12px; }
    .inv-status.draft { background:rgba(107,114,128,.12); color:#6b7280; }
    .inv-status.sent  { background:rgba(217,119,6,.12); color:var(--amber-dim); }
    .inv-status.paid  { background:rgba(22,163,74,.12); color:#16a34a; }
    .inv-total { font-family:'Share Tech Mono',monospace; font-size:18px; font-weight:700; color:var(--text-bright); text-align:right; }
    .inv-actions { display:flex; gap:6px; margin-top:8px; justify-content:flex-end; }
    .sr-cb { width:16px; height:16px; cursor:pointer; accent-color:var(--amber); flex-shrink:0; margin-top:2px; }
    .sr-invoiced-badge { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; background:rgba(22,163,74,.1); color:#16a34a; border:1px solid rgba(22,163,74,.25); padding:2px 7px; border-radius:10px; }
    .invoice-bar { display:flex; align-items:center; justify-content:space-between; background:rgba(217,119,6,.08); border:1px solid rgba(217,119,6,.2); border-radius:6px; padding:10px 16px; margin-bottom:12px; }
    .invoice-bar-msg { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; color:var(--amber-dim); }
    .labor-row { display:grid; grid-template-columns:1fr 80px 80px auto; gap:8px; align-items:center; }
    .labor-row input { background:var(--bg3); border:1px solid var(--border2); border-radius:4px; padding:7px 10px; color:var(--text-bright); font-family:'Barlow',sans-serif; font-size:13px; outline:none; width:100%; }
    .labor-row input:focus { border-color:var(--amber); }
    /* PRINT invoice */
    @media print {
      .print-invoice { display:block !important; }
      .no-print { display:none !important; }
    }
    .print-invoice { display:none; }


    /* PARTS TO ORDER */
    .po-table { width:100%; border-collapse:collapse; font-size:13px; }
    .po-table th { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); padding:8px 12px; text-align:left; border-bottom:2px solid var(--border); background:#f8f9fa; position:sticky; top:0; }
    .po-table td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .po-row-needed  { background:#fff5f5; border-left:3px solid #dc2626; }
    .po-row-ordered { background:#fffbeb; border-left:3px solid #d97706; }
    .po-row-received{ background:#f0fdf4; border-left:3px solid #16a34a; }
    .po-row-needed td:first-child  { color:#dc2626; }
    .po-row-ordered td:first-child { color:#d97706; }
    .po-row-received td:first-child{ color:#16a34a; }
    .po-status-dot { width:10px; height:10px; border-radius:50%; display:inline-block; flex-shrink:0; }
    .po-status-dot.needed   { background:#dc2626; }
    .po-status-dot.ordered  { background:#d97706; }
    .po-status-dot.received { background:#16a34a; }
    .po-cb { accent-color:var(--amber); width:15px; height:15px; cursor:pointer; }
    .po-add-bar { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; margin-bottom:16px; padding:14px 16px; background:var(--panel); border:1px solid var(--border); border-radius:6px; }
    .po-add-bar .form-group { margin:0; flex:1; min-width:120px; }
    .po-summary { display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
    .po-stat { background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:10px 16px; min-width:90px; }
    .po-stat-val { font-family:'Share Tech Mono',monospace; font-size:20px; font-weight:700; }
    .po-stat-lbl { font-size:11px; color:var(--text-dim); margin-top:2px; }
    .po-stat.needed  .po-stat-val { color:#dc2626; }

    function compressImage(file, maxW, maxH, quality) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          let w=img.width, h=img.height;
          if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
          if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
          const canvas=document.createElement('canvas');
          canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL('image/jpeg',quality));
        };
        img.src=url;
      });
    }

    function getPartsArray(r) {
      if (r.parts && Array.isArray(r.parts) && r.parts.length > 0) return r.parts;

      // legacy: split from notes
      const raw = r.notes || '';
      const idx = raw.indexOf(' | Parts:');
      if (idx !== -1) return [{desc:'', num: raw.slice(idx + 9).trim()}];
      return [];
    }
    function getCleanNotes(r) {
      if (r.parts) return r.notes||'';
      if (r.partnum) return r.notes||'';
      const raw = r.notes||'';
      const idx = raw.indexOf(' | Parts:');
      return idx === -1 ? raw : raw.slice(0, idx).trim();
    }

    function renderPartsHeader() {
      const allParts = (data.partsToOrder || []).slice().reverse();

      const vendors = [...new Set(allParts.map(p=>p.vendor).filter(Boolean))].sort();
      const activeFilters = Object.values(pf).filter(Boolean).length;
      const needed   = allParts.filter(p=>!p.ordered && !p.received).length;

      return `        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div>

          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">

          </div>
        </div>`;
    }

    function renderPartsTable() {
      const allParts = (data.partsToOrder || []).slice().reverse();
      const pf = poFilters;
      const parts = allParts.filter(p=>{
        const q = pf.q.toLowerCase();
        if (q && !(p.desc+p.num+p.vendor+(p.notes||'')).toLowerCase().includes(q)) return false;
        if (pf.vendor && (p.vendor||'').toLowerCase() !== pf.vendor.toLowerCase()) return false;
        if (pf.num && (p.num||'').toLowerCase() !== pf.num.toLowerCase()) return false;
        if (pf.vehicle) {
          if (pf.vehicle === '__stock__') { if (p.vehicleId !== '__stock__') return false; }
          else if (p.vehicleId !== pf.vehicle) return false;
        }
        if (pf.status === 'needed'   && (p.ordered||p.received)) return false;
        if (pf.status === 'ordered'  && (!p.ordered||p.received)) return false;
        if (pf.status === 'received' && !p.received) return false;
        return true;
      });
      const activeFilters = Object.values(poFilters).filter(Boolean).length;
      const needed   = parts.filter(p=>!p.ordered && !p.received).length;
      const ordered  = parts.filter(p=>p.ordered && !p.received).length;
      const received = parts.filter(p=>p.received).length;
      const vendors = [...new Set(allParts.map(p=>p.vendor).filter(Boolean))].sort();
      return `        <div class="po-summary" style="margin-top:0">
          <div class="po-stat needed"><div class="po-stat-val">${needed}</div><div class="po-stat-lbl">To Order</div></div>
          <div class="po-stat ordered"><div class="po-stat-val">${ordered}</div><div class="po-stat-lbl">Ordered</div></div>
          <div class="po-stat received"><div class="po-stat-val">${received}</div><div class="po-stat-lbl">Received</div></div>
        </div>

        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;padding:12px 14px;background:var(--panel);border:1px solid var(--border);border-radius:6px;align-items:flex-end">

          <div style="min-width:140px;flex:1">
            <label class="form-lbl" style="margin-bottom:3px;display:block">Vendor</label>

              <div class="cs-dropdown" id="cs-po-vendor" style="display:none">
                <div class="cs-option${!pf.vendor?' selected':''}" data-action="cs-pick" data-cs="po-vendor" data-field="vendor" data-val="">All Vendors</div>
                ${vendors.map(v=>`<div class="cs-option${pf.vendor===v?' selected':''}" data-action="cs-pick" data-cs="po-vendor" data-field="vendor" data-val="${esc(v)}">${esc(v)}</div>`).join('')}
              </div>
            </div>
          </div>
          <div style="min-width:120px;flex:1">
            <label class="form-lbl" style="margin-bottom:3px;display:block">Part #</label>
            <div class="cs-wrap" data-cs="po-num">
              <div class="cs-display" data-action="cs-open" data-cs="po-num">${pf.num||'All Part #s'}</div>
              <div class="cs-dropdown" id="cs-po-num" style="display:none">

                ${[...new Set(allParts.map(p=>p.num).filter(Boolean))].sort().map(n=>`<div class="cs-option${pf.num===n?' selected':''}" data-action="cs-pick" data-cs="po-num" data-field="num" data-val="${esc(n)}">${esc(n)}</div>`).join('')}
              </div>
            </div>
          </div>

              <div class="cs-dropdown" id="cs-po-status" style="display:none">
                ${[['','All Status'],['needed','To Order'],['ordered','Ordered'],['received','Received']].map(([v,l])=>`<div class="cs-option${pf.status===v?' selected':''}" data-action="cs-pick" data-cs="po-status" data-field="status" data-val="${v}">${l}</div>`).join('')}

          </div>
          <div style="min-width:160px;flex:2">
            <label class="form-lbl" style="margin-bottom:3px;display:block">Vehicle</label>
            <div class="cs-wrap" data-cs="po-vehicle">
              <div class="cs-display" data-action="cs-open" data-cs="po-vehicle">${pf.vehicle===''?'All Vehicles':pf.vehicle==='__stock__'?'📦 For Stock':((data.vehicles||[]).find(v=>v.id===pf.vehicle)||{}).name||'All Vehicles'}</div>
              <div class="cs-dropdown" id="cs-po-vehicle" style="display:none">
                <div class="cs-option${!pf.vehicle?' selected':''}" data-action="cs-pick" data-cs="po-vehicle" data-field="vehicle" data-val="">All Vehicles</div>
                <div class="cs-option${pf.vehicle==='__stock__'?' selected':''}" data-action="cs-pick" data-cs="po-vehicle" data-field="vehicle" data-val="__stock__">📦 For Stock</div>
                ${(data.vehicles||[]).filter(v=>allParts.some(p=>p.vehicleId===v.id)).sort((a,b)=>a.name.localeCompare(b.name)).map(v=>`<div class="cs-option${pf.vehicle===v.id?' selected':''}" data-action="cs-pick" data-cs="po-vehicle" data-field="vehicle" data-val="${esc(v.id)}">${esc(v.name)}</div>`).join('')}
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:flex-end">
            ${activeFilters?`<button class="btn btn-ghost btn-sm" style="white-space:nowrap" data-action="po-clear-filters">✕ Clear</button>`:'<div style="width:60px"></div>'}

        </div>

        <div class="po-add-bar">
          <div class="form-group"><label class="form-lbl">Vendor</label>
            <input id="po-vendor" class="form-input" list="vendor-list-po" placeholder="Select or type vendor..." />
            <datalist id="vendor-list-po">${(data.vendors||[]).sort((a,b)=>a.name.localeCompare(b.name)).map(v=>`<option value="${esc(v.name)}"></option>`).join('')}</datalist>
          </div>
          <div class="form-group" style="flex:2"><label class="form-lbl">Part Description</label>
            <input id="po-desc" class="form-input" list="inv-desc-list-po" placeholder="e.g. Oil filter..." autocomplete="off" />
            <datalist id="inv-desc-list-po">${(data.partsInventory||[]).sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<option value="${esc(p.name)}"></option>`).join('')}</datalist>
          </div>
          <div class="form-group"><label class="form-lbl">Part #</label>
            <input id="po-num" class="form-input" list="inv-num-list-po" placeholder="e.g. 1792XE" autocomplete="off" />
            <datalist id="inv-num-list-po">${(data.partsInventory||[]).filter(p=>p.num).sort((a,b)=>a.num.localeCompare(b.num)).map(p=>`<option value="${esc(p.num)}">${esc(p.name)}</option>`).join('')}</datalist>
          </div>
          <div class="form-group" style="flex:none;min-width:70px"><label class="form-lbl">Qty</label><input id="po-qty" class="form-input" type="number" placeholder="1" min="1" /></div>
          <div class="form-group" style="flex:none;min-width:90px"><label class="form-lbl">Unit Cost</label><input id="po-cost" class="form-input" type="number" placeholder="$0.00" min="0" step="0.01" /></div>
          <div class="form-group" style="flex:none"><label class="form-lbl">For Vehicle</label>
            <select id="po-vehicle" class="form-select" style="min-width:140px">
              <option value="">— optional —</option>
              <option value="__stock__">📦 For Stock</option>
              ${(data.vehicles||[]).sort((a,b)=>a.name.localeCompare(b.name)).map(v=>`<option value="${esc(v.id)}">${esc(v.name)}</option>`).join('')}
            </select>
          </div>
          <button class="btn btn-primary" data-action="add-part-order" style="flex-shrink:0;align-self:flex-end;margin-bottom:1px">+ Add</button>
        </div>

        ${parts.length===0
          ? `<div class="empty"><div class="empty-icon">🔩</div><div class="empty-title">No Parts Listed</div><div style="font-size:14px">Add parts above to start tracking orders.</div></div>`
          : `<div style="overflow-x:auto">
            <table class="po-table">
              <thead><tr>
                <th style="width:28px"></th>
                <th>Vendor</th>
                <th>Description</th>
                <th>Part #</th>
                <th style="text-align:center">Qty</th>
                <th>Vehicle</th>
                <th>Unit Cost</th>
                <th style="text-align:center">Ordered</th>
                <th style="text-align:center">Received</th>
                <th style="width:40px"></th>
              </tr></thead>
              <tbody>
                ${parts.map(p=>{
                  const rowClass = p.received ? 'po-row-received' : p.ordered ? 'po-row-ordered' : 'po-row-needed';
                  const dotClass = p.received ? 'received' : p.ordered ? 'ordered' : 'needed';
                  const veh = p.vehicleId === '__stock__' ? {name:'📦 For Stock'} : (p.vehicleId ? (data.vehicles||[]).find(v=>v.id===p.vehicleId) : null);
                  return `<tr class="${rowClass}">
                    <td><span class="po-status-dot ${dotClass}"></span></td>
                    <td>${esc(p.vendor||'')}</td>
                    <td style="font-weight:600">${esc(p.desc||'')}</td>
                    <td style="font-family:'Share Tech Mono',monospace;color:var(--amber-dim)">${esc(p.num||'')}</td>
                    <td style="text-align:center;font-family:'Share Tech Mono',monospace;font-weight:700">${p.qty||''}</td>
                    <td style="font-size:12px;color:var(--text-dim)">${veh?esc(veh.name):''}</td>
                    <td><input type="number" class="form-input" style="padding:4px 8px;font-size:12px;width:90px" placeholder="$0.00" value="${p.unitCost||''}" data-action="po-cost-input" data-id="${esc(p.id)}" min="0" step="0.01" /></td>
                    <td style="text-align:center"><input type="checkbox" class="po-cb" data-action="toggle-part-ordered" data-id="${esc(p.id)}" ${p.ordered||p.received?'checked':''} ${p.received?'disabled':''} /></td>
                    <td style="text-align:center"><input type="checkbox" class="po-cb" data-action="toggle-part-received" data-id="${esc(p.id)}" ${p.received?'checked':''} /></td>
                    <td style="display:flex;gap:4px"><button class="btn btn-ghost btn-sm" style="padding:3px 8px" data-action="edit-part-order" data-id="${esc(p.id)}">Edit</button><button class="btn btn-danger btn-sm" style="padding:3px 8px" data-action="del-part-order" data-id="${esc(p.id)}">✕</button></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table></div>`}`;
    }


    function renderPartsInventory() {
      const inv = data.partsInventory || [];
      const invSearch = window._invSearch || '';
      const filtered = invSearch
        ? inv.filter(p=>(p.name+p.num+p.vendor+p.notes).toLowerCase().includes(invSearch.toLowerCase()))
        : inv;
      const lowStock = inv.filter(p=>p.qty!==''&&p.minQty!==''&&Number(p.qty)<=Number(p.minQty)).length;

      return `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
          <div>
            <div class="overview-title">Parts Inventory</div>
            <div class="overview-sub">${inv.length} part${inv.length!==1?'s':''} on file${lowStock>0?`  ·  <span style="color:#dc2626;font-weight:600">${lowStock} low stock</span>`:''}
            </div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <input id="inv-search" class="form-input" style="width:200px" placeholder="Search parts..." value="${esc(invSearch)}" data-action="inv-search" autocomplete="off" />
          </div>
        </div>

        <div class="po-add-bar">
          <div class="form-group" style="flex:2"><label class="form-lbl">Part Name *</label><input id="inv-name" class="form-input" placeholder="e.g. Oil Filter" /></div>
          <div class="form-group"><label class="form-lbl">Part #</label><input id="inv-num" class="form-input" placeholder="e.g. 1792XE" /></div>
          <div class="form-group"><label class="form-lbl">Vendor</label><input id="inv-vendor" class="form-input" placeholder="e.g. NAPA" /></div>
          <div class="form-group" style="flex:none;min-width:70px"><label class="form-lbl">Qty</label><input id="inv-qty" class="form-input" type="number" placeholder="0" min="0" /></div>
          <div class="form-group" style="flex:none;min-width:70px"><label class="form-lbl">Min Qty</label><input id="inv-minqty" class="form-input" type="number" placeholder="—" min="0" /></div>
          <div class="form-group"><label class="form-lbl">Location</label>
            <input id="inv-location" class="form-input" list="inv-loc-list-quick" placeholder="e.g. Shop shelf B" />
            <datalist id="inv-loc-list-quick">${[...new Set((data.partsInventory||[]).map(p=>p.location).filter(Boolean))].sort().map(loc=>`<option value="${esc(loc)}"></option>`).join('')}</datalist>
          </div>
          <button class="btn btn-primary" data-action="add-inv-part" style="flex-shrink:0;align-self:flex-end;margin-bottom:1px">+ Add</button>
        </div>

        ${filtered.length===0
          ? `<div class="empty"><div class="empty-icon">📦</div><div class="empty-title">${inv.length===0?'No Parts Yet':'No Results'}</div><div style="font-size:14px">${inv.length===0?'Add parts above to build your inventory.':'Try a different search.'}</div></div>`
          : `<div style="overflow-x:auto">
            <table class="po-table">
              <thead><tr>
                <th>Part Name</th>
                <th>Part #</th>
                <th>Vendor</th>
                <th style="text-align:center">Qty</th>
                <th style="text-align:center">Min</th>
                <th>Location</th>
                <th>Notes</th>
                <th style="width:80px"></th>
              </tr></thead>
              <tbody>
                ${filtered.map(p=>{
                  const low = p.qty!==''&&p.minQty!==''&&Number(p.qty)<=Number(p.minQty);
                  const none = p.qty!==''&&Number(p.qty)===0;
                  const rowStyle = none?'background:#fff5f5;border-left:3px solid #dc2626':low?'background:#fffbeb;border-left:3px solid #d97706':'border-left:3px solid #16a34a';
                  return `<tr style="${rowStyle}">
                    <td style="font-weight:600">${esc(p.name||'')}</td>
                    <td style="font-family:'Share Tech Mono',monospace;color:var(--amber-dim)">${esc(p.num||'')}</td>
                    <td style="color:var(--text-dim)">${esc(p.vendor||'')}</td>
                    <td style="text-align:center">
                      <div style="display:flex;align-items:center;justify-content:center;gap:4px">
                        <button style="background:none;border:1px solid var(--border);border-radius:3px;width:22px;height:22px;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center" data-action="inv-qty-dec" data-id="${esc(p.id)}">−</button>
                        <span style="font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;min-width:24px;text-align:center;color:${none?'#dc2626':low?'#d97706':'var(--text-bright)'}">${p.qty!==''?p.qty:'—'}</span>
                        <button style="background:none;border:1px solid var(--border);border-radius:3px;width:22px;height:22px;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center" data-action="inv-qty-inc" data-id="${esc(p.id)}">+</button>
                      </div>
                    </td>
                    <td style="text-align:center;color:var(--text-dim)">${p.minQty!==''?p.minQty:'—'}</td>
                    <td style="font-size:12px;color:var(--text-dim)">${esc(p.location||'')}</td>
                    <td style="font-size:12px;color:var(--text-dim)">${esc(p.notes||'')}</td>
                    <td style="display:flex;gap:4px;flex-wrap:wrap">
                      ${(low||none)?((data.partsToOrder||[]).some(o=>o.invPartId===p.id&&!o.received)?'<span style="font-size:10px;font-family:\'Share Tech Mono\',monospace;color:#d97706;padding:3px 6px;background:rgba(217,119,6,.1);border-radius:3px;white-space:nowrap">On Order</span>':'<button class="btn btn-sm" style="padding:3px 8px;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#dc2626" data-action="inv-reorder" data-id="'+esc(p.id)+'">+ Order</button>'):''}
                      <button class="btn btn-ghost btn-sm" style="padding:3px 8px" data-action="edit-inv-part" data-id="${esc(p.id)}">Edit</button>
                      <button class="btn btn-danger btn-sm" style="padding:3px 8px" data-action="del-inv-part" data-id="${esc(p.id)}">✕</button>
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table></div>`}`;
    }

              <div class="form-group"><label class="form-lbl">Min Qty Alert</label><input id="f-inv-minqty" class="form-input" type="number" value="${p?.minQty??''}" placeholder="—" min="0" /></div>
            </div>
            <div class="form-group"><label class="form-lbl">Storage Location</label>

    function getFeature(name) {
      return (data.settings?.features || {})[name] !== false;
    }

    function renderAdmin() {
      const features = data.settings?.features || {};
      const toggleRow = (key, name, hint) => {
        const on = features[key] !== false;
        return `<div class="admin-toggle-row">
          <div class="admin-toggle-label">
            <div class="admin-toggle-name">${name}</div>
            <div class="admin-toggle-hint">${hint}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="admin-badge ${on?'on':'off'}">${on?'ON':'OFF'}</span>
            <label class="toggle-switch">
              <input type="checkbox" data-action="toggle-feature" data-key="${key}" ${on?'checked':''} />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>`;
      };

      return `

            </div>
            <div class="admin-section-body">
              <div class="admin-toggle-row">

                </div>
                <div style="display:flex;gap:8px">

              ${data.settings?.qb?.mode ? `
              <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
                <div style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px">Chart of Accounts Mapping</div>

                <div style="font-size:13px;color:var(--text-dim);margin-bottom:10px">Export invoices as an IIF file. In QuickBooks Desktop: <strong>File → Utilities → Import → IIF Files</strong></div>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                  <button class="btn btn-primary btn-sm" data-action="qb-export-all-iif">Export All Invoices (IIF)</button>
                  <button class="btn btn-ghost btn-sm" data-action="qb-export-customers-iif">Export Customer List (IIF)</button>
                </div>

    function renderOrderHistory() {

      const byVendor = {};

    function renderGlobalSearch() {
      const q = globalSearch.toLowerCase().trim();
      const results = [];
      if (q.length >= 2) {
        // Fleet service records
        data.records.forEach(r=>{
          const v = (data.vehicles||[]).find(vv=>vv.id===r.vehicleId);
          const text = [r.type,r.notes,r.partnum,(r.parts||[]).map(p=>p.desc+' '+p.num).join(' '),v?.name].join(' ').toLowerCase();
          if (text.includes(q)) results.push({source:'fleet',label:'Service Record',title:(v?.name||'Unknown')+' · '+r.type+' · '+r.date,snippet:r.notes?.slice(0,80)||'',action:()=>{appView='fleet';selectedId=r.vehicleId;render();}});
        });
        // Invoices
        (data.invoices||[]).forEach(inv=>{
          const cust=(data.customers||[]).find(c=>c.id===inv.customerId);
          const text=[inv.num,inv.businessName,cust?.name,(inv.lineItems||[]).map(l=>l.type+' '+l.notes).join(' ')].join(' ').toLowerCase();
          if(text.includes(q)) results.push({source:'invoice',label:'Invoice',title:inv.num+' · '+(cust?.name||'')+' · '+inv.date,snippet:'$'+Number(inv.total||0).toFixed(2)+' · '+inv.status,action:()=>{appView='invoices';render();}});
        });
        // Order Parts (active)
        (data.partsToOrder||[]).forEach(p=>{
          const text=[p.desc,p.num,p.vendor].join(' ').toLowerCase();
          if(text.includes(q)) results.push({source:'order',label:'Order Parts',title:(p.vendor?p.vendor+' · ':'')+p.desc,snippet:'Part# '+p.num+(p.qty?' · qty '+p.qty:'')+(p.ordered?' · Ordered':p.received?' · Received':' · Pending'),action:()=>{appView='parts';render();}});
        });
        // Order History
        (data.orderHistory||[]).forEach(p=>{
          const text=[p.desc,p.num,p.vendor].join(' ').toLowerCase();
          if(text.includes(q)) results.push({source:'history',label:'Order History',title:(p.vendor?p.vendor+' · ':'')+p.desc,snippet:'Part# '+p.num+(p.qty?' · qty '+p.qty:'')+(p.receivedDate?' · '+p.receivedDate:''),action:()=>{appView='orderhistory';render();}});
        });
        // Parts inventory
        (data.partsInventory||[]).forEach(p=>{
          const text=[p.name,p.num,p.vendor,p.notes,p.location].join(' ').toLowerCase();
          if(text.includes(q)) results.push({source:'parts',label:'Parts Inventory',title:p.name+(p.num?' · '+p.num:''),snippet:(p.vendor?p.vendor+' · ':'')+('qty: '+(p.qty||'—'))+(p.location?' · '+p.location:''),action:()=>{appView='inventory';render();}});
        });
      }

      return `
        <div style="margin-bottom:16px">
          <div class="overview-title">Global Search</div>
          <div class="overview-sub">Search across all fleet records, invoices, orders, and inventory.</div>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:16px">
          <input id="gs-input" class="form-input" style="max-width:480px" placeholder="Search everything..." value="${esc(globalSearch)}" data-action="gs-input" autocomplete="off" />
          ${globalSearch?`<button class="btn btn-ghost" data-action="gs-clear">Clear</button>`:''}
        </div>
        ${q.length<2&&globalSearch?'<div style="color:var(--text-dim);font-size:13px">Type at least 2 characters to search.</div>':''}
        ${q.length>=2?(results.length===0
          ? `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No Results</div><div style="font-size:14px">Nothing found for "${esc(globalSearch)}".</div></div>`
          : `<div style="margin-bottom:8px;font-size:13px;color:var(--text-dim)">${results.length} result${results.length!==1?'s':''}</div>`
            + results.map((r,i)=>`<div class="gs-result" data-action="gs-goto" data-idx="${i}">
              <span class="gs-source ${r.source}">${r.label}</span>
              <div class="gs-title">${esc(r.title)}</div>
              <div class="gs-snippet">${esc(r.snippet)}</div>
            </div>`).join(''))
          :''}`;
    }

    // ── QuickBooks Export Functions ───────────────────────────────────────────

    function qbCustomerName(custId) {
      const c = (data.customers||[]).find(c=>c.id===custId);
      return c ? c.name : 'Unknown Customer';
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], {type: mimeType});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function exportCustomersIIF() {
      const customers = data.customers || [];
      let iif = '!CUST\tNAME\tBSTREET\tBCITY\tBSTATE\tBZIP\tPHONE1\n';
      customers.forEach(c => {
        iif += 'CUST\t' + [c.name,'','','','','',''].join('\t') + '\n';
      });
      downloadFile('servicelog-customers.iif', iif, 'text/plain');
    }

    function exportCustomersCSV() {
      const customers = data.customers || [];
      let csv = 'Customer Name,Company,Email,Phone,Billing Address\n';
      customers.forEach(c => {
        csv += `"${(c.name||'').replace(/"/g,'""')}","${(c.name||'').replace(/"/g,'""')}","","","\n`;

    function exportInvoicesIIF() {
      const invoices = data.invoices || [];
      const qb = data.settings?.qb || {};
      const svcAcct  = qb.serviceAccount || 'Service';
      const partsAcct = qb.partsAccount  || 'Parts';
      const laborAcct = qb.laborAccount  || 'Labor';
      if (!invoices.length) { alert('No invoices to export.'); return; }

      let iif = '!TRNS\tTRNSTYPE\tDATE\tACCNT\tNAME\tAMOUNT\tDOCNUM\tMEMO\n';
      iif    += '!SPL\tTRNSTYPE\tDATE\tACCNT\tNAME\tAMOUNT\tMEMO\n';
      iif    += '!ENDTRNS\n';

      invoices.forEach(inv => {
        const custName = qbCustomerName(inv.customerId);
        const date = inv.date || '';
        const total = Number(inv.total||0).toFixed(2);
        const docNum = inv.num || '';
        // Transaction header
        iif += `TRNS\tINVOICE\t${date}\tAccounts Receivable\t${custName}\t${total}\t${docNum}\t${inv.businessName||''}\n`;
        // Line items
        (inv.lineItems||[]).forEach(li => {
          const amt = Number(li.cost||0).toFixed(2);
          if (!amt || amt==='0.00') return;
          iif += `SPL\tINVOICE\t${date}\t${svcAcct}\t${custName}\t-${amt}\t${(li.type||'').replace(/\t/g,' ')}\n`;
        });
        // Labor lines
        (inv.laborLines||[]).forEach(l => {
          const amt = Number(l.total||0).toFixed(2);
          if (!amt || amt==='0.00') return;
          iif += `SPL\tINVOICE\t${date}\t${laborAcct}\t${custName}\t-${amt}\t${(l.desc||'Labor').replace(/\t/g,' ')}\n`;
        });
        iif += 'ENDTRNS\n';
      });
      downloadFile('servicelog-invoices.iif', iif, 'text/plain');
      alert(`Exported ${invoices.length} invoice(s).\n\nIn QuickBooks Desktop: File → Utilities → Import → IIF Files`);
    }

    function exportInvoicesCSV() {
      const invoices = data.invoices || [];
      if (!invoices.length) { alert('No invoices to export.'); return; }

      // QBO Invoice import format
      const rows = [];
      rows.push([
        'InvoiceNo','Customer','InvoiceDate','DueDate','Item(Product/Service)',
        'ItemDescription','ItemQuantity','ItemRate','ItemAmount','TaxCode','Terms','Location'
      ].join(','));

      invoices.forEach(inv => {
        const custName = qbCustomerName(inv.customerId);
        const date = inv.date||'';
        const dueDate = date; // same day; could add 30-day terms
        const invNum = inv.num||'';
        const qb = data.settings?.qb || {};

        const addRow = (item, desc, qty, rate) => {
          rows.push([
            invNum, `"${custName.replace(/"/g,'""')}"`, date, dueDate,
            `"${item.replace(/"/g,'""')}"`,
            `"${(desc||'').replace(/"/g,'""').slice(0,100)}"`,
            qty, Number(rate).toFixed(2),
            (Number(qty)*Number(rate)).toFixed(2), '', 'Net 30', ''
          ].join(','));
        };

        (inv.lineItems||[]).forEach(li => {
          if (!li.cost) return;
          addRow(qb.serviceAccount||'Service', li.type+(li.notes?' - '+li.notes:''), 1, li.cost);
        });
        (inv.laborLines||[]).filter(l=>l.total).forEach(l => {
          addRow(qb.laborAccount||'Labor', l.desc||'Labor', l.hrs||1, l.hrs?l.rate:l.total);
        });
      });

      downloadFile('servicelog-invoices.csv', rows.join('\n'), 'text/csv');
      alert(`Exported ${invoices.length} invoice(s) for ${[...new Set(invoices.map(i=>qbCustomerName(i.customerId)))].length} customer(s).\n\nIn QBO: Settings → Import Data → Invoices`);
    }

    // Returns {action:'combine',match} or {action:'ask',match} or {action:'new'}
    function checkDuplicateOrder(num, vendor, desc, excludeId) {
      const list = (data.partsToOrder||[]).filter(o=>!o.ordered&&!o.received&&o.id!==excludeId);
      if (!num) {
        // No part#, fall back to desc match
        const m = list.find(o=>desc && o.desc && o.desc.toLowerCase()===desc.toLowerCase());
        return m ? {action:'ask', match:m, sameVendor:true} : {action:'new'};
      }
      // Match by part# (case-insensitive, strip spaces/dashes)
      const cleanNum = num.toLowerCase().replace(/[\s\-]/g,'');
      const m = list.find(o=>o.num && o.num.toLowerCase().replace(/[\s\-]/g,'')===cleanNum);
      if (!m) return {action:'new'};
      const sameVendor = !vendor || !m.vendor || vendor.toLowerCase()===m.vendor.toLowerCase();
      return {action: sameVendor ? 'combine' : 'ask', match:m, sameVendor};
    }

    function applyDuplicateCheck(num, vendor, desc, qty, vehicleId, invPartId, onNew) {
      const result = checkDuplicateOrder(num, vendor, desc, null);
      const addQtyNum = parseInt(qty)||1;
      if (result.action==='combine') {
        // Same part#, same vendor — silently combine
        const newQty = (parseInt(result.match.qty)||0) + addQtyNum;
        update({...data, partsToOrder:(data.partsToOrder||[]).map(o=>o.id===result.match.id?{...o,qty:String(newQty)}:o)});
        appView='parts'; render();
      } else if (result.action==='ask') {
        const m = result.match;
        const msg = 'Part# '+num+' is already on the list'+(m.vendor?' from '+m.vendor:'')+' (qty: '+(m.qty||'-')+').\n'+(result.sameVendor?'':'Different vendor (yours: '+(vendor||'none')+').\n')+'Add '+addQtyNum+' to that line? (Cancel = add as separate line)';
        if (confirm(msg)) {
          const newQty = (parseInt(m.qty)||0) + addQtyNum;
          update({...data, partsToOrder:(data.partsToOrder||[]).map(o=>o.id===m.id?{...o,qty:String(newQty)}:o)});
          appView='parts'; render();
        } else {
          onNew();
        }
      } else {
        onNew();
      }
    }

      } else if (action==='edit-record') {
        modalState={type:'record',target:data.records.find(r=>r.id===id)||null}; render();
      } else if (action==='del-record') {
        if(!confirm('Delete this service record?'))return;
        const recToDel = data.records.find(r=>r.id===id);
        let partsInventory = data.partsInventory||[];
        if (recToDel) {
          const linkedParts = getPartsArray(recToDel).filter(p=>p.invPartId);
          if (linkedParts.length > 0) {
            const partNames = linkedParts.map(p=>(p.qtyUsed||1)+'x '+(p.desc||p.num||'part')).join(', ');
            if (confirm('Return parts to inventory?\n\n' + partNames + '\n\nClick OK to return them, Cancel to discard.')) {
              linkedParts.forEach(function(p) {
                const qty = parseInt(p.qtyUsed)||1;
                partsInventory = partsInventory.map(function(ip) {
                  return ip.id===p.invPartId ? {...ip, qty:String((parseInt(ip.qty)||0)+qty)} : ip;
                });
              });
            }
          }
        }
        update({...data, partsInventory, records:data.records.filter(r=>r.id!==id)});
      } else if (action==='close-modal') {
        modalState=null; pendingPhoto=undefined; render();
      } else if (action==='save-vehicle') {
        const name = document.getElementById('f-name').value.trim();
        if(!name){alert('Name is required.');return;}
        const custEl = document.getElementById('f-custid');
        const form = {
          name, type:document.getElementById('f-type').value,
          year:document.getElementById('f-year').value,
          make:document.getElementById('f-make').value,
          model:document.getElementById('f-model').value,
          engine:document.getElementById('f-engine')?.value?.trim()||'',
          hp:document.getElementById('f-hp')?.value?.trim()||'',
          vin:document.getElementById('f-vin').value,
          hours:document.getElementById('f-hours').value,
          notes:document.getElementById('f-notes').value,
          customerId: custEl ? custEl.value : (selectedCustomerId || (data.customers||[])[0]?.id || ''),
        };
        let targetId = modalState.target?.id;
        // Determine final photo value
        const existingPhoto = modalState.target ? (modalState.target.photo||null) : null;
        const finalPhoto = pendingPhoto !== undefined ? pendingPhoto : existingPhoto;
        const formWithPhoto = finalPhoto ? {...form, photo: finalPhoto} : {...form};
        if(formWithPhoto.photo === null) delete formWithPhoto.photo;
        if(modalState.target) {
          update({...data,vehicles:data.vehicles.map(v=>v.id===targetId?{...modalState.target,...formWithPhoto}:v)});
        } else {
          const nv={id:uid(),...formWithPhoto};
          targetId=nv.id; selectedId=nv.id;
          update({...data,vehicles:[...data.vehicles,nv]});
        }
        // Photo is stored inside the vehicle object - already handled in update() above
        pendingPhoto=undefined;
        modalState=null; render();
      } else if (action==='save-record') {
        const date=document.getElementById('f-date').value;
        const type=document.getElementById('f-type').value;
        if(!date||!type){alert('Date and type are required.');return;}
        // Read parts array from dynamic list
        const partEntries = document.querySelectorAll('#parts-list .part-entry');
        const partsArr = [];
        partEntries.forEach(function(entry) {
          const desc = entry.querySelector('.part-desc-input')?.value?.trim()||'';
          const invPartId = entry.dataset.invId || '';
          const num = entry.querySelector('.part-num-input')?.value?.trim()||'';
          const cost = entry.querySelector('.part-cost-input')?.value?.trim()||'';
          const qtyUsed = entry.querySelector('.part-qty-input')?.value?.trim()||'1';
          if (desc || num) partsArr.push({desc:desc, num:num, cost:cost, qtyUsed, invPartId});
        });
        // Auto-sum parts costs
        const partsTotalCost = partsArr.reduce(function(s,p){return s+(parseFloat(p.cost)||0);},0);
        const manualCost = document.getElementById('f-cost').value;
        const finalCost = manualCost || (partsTotalCost > 0 ? String(partsTotalCost) : '');
        const form={date,type,
          cost: finalCost,
          hours:document.getElementById('f-hours').value,
          tech:document.getElementById('f-tech').value,
          parts: partsArr,
          partnum: partsArr.length>0 ? partsArr.map(p=>[p.desc,p.num].filter(Boolean).join(': ')).join('; ') : '',
          notes:document.getElementById('f-notes').value,
        };
        let vehicles=data.vehicles;
        if(form.hours){
          const newHrs=parseFloat(form.hours);
          const veh=data.vehicles.find(v=>v.id===selectedId);
          if(veh&&newHrs>(parseFloat(veh.hours)||0))
            vehicles=data.vehicles.map(v=>v.id===selectedId?{...v,hours:String(newHrs)}:v);
        }
        // Deduct used parts from inventory
        let partsInventory = data.partsInventory || [];
        const isEdit = !!modalState.target;
        if (!isEdit) {
          // New record: deduct qty used for linked inventory parts
          partsArr.forEach(function(p) {
            if (p.invPartId) {
              const qtyUsedNum = parseInt(p.qtyUsed)||1;
              partsInventory = partsInventory.map(function(ip) {
                return ip.id===p.invPartId
                  ? {...ip, qty: String(Math.max(0,(parseInt(ip.qty)||0)-qtyUsedNum))}
                  : ip;
              });
            }
          });
        } else {
          // Edit: compare old parts vs new parts for inventory delta
          const oldParts = getPartsArray(modalState.target);
          // Restore old quantities
          oldParts.forEach(function(p) {
            if (p.invPartId) {
              const oldQty = parseInt(p.qtyUsed)||1;
              partsInventory = partsInventory.map(function(ip) {
                return ip.id===p.invPartId ? {...ip, qty:String((parseInt(ip.qty)||0)+oldQty)} : ip;
              });
            }
          });
          // Deduct new quantities
          partsArr.forEach(function(p) {
            if (p.invPartId) {
              const qtyUsedNum = parseInt(p.qtyUsed)||1;
              partsInventory = partsInventory.map(function(ip) {
                return ip.id===p.invPartId
                  ? {...ip, qty:String(Math.max(0,(parseInt(ip.qty)||0)-qtyUsedNum))}
                  : ip;
              });
            }
          });
        }
        if(modalState.target) {
          update({...data,partsInventory,vehicles:vehicles,records:data.records.map(r=>r.id===modalState.target.id?{...modalState.target,...form}:r)});
        } else {
          update({...data,partsInventory,vehicles:vehicles,records:[...data.records,{id:uid(),vehicleId:selectedId,...form}]});
        }
        modalState=null; render();
      }
    });

    render();

    // Keep keyword input wired across re-renders
    document.getElementById('app').addEventListener('input', function(e) {
      if (e.target.id === 'po-kw-input') {
        poFilters.q = e.target.value;
        clearTimeout(window._kwTimer);
        window._kwTimer = setTimeout(function() {
          const val = document.getElementById('po-kw-input')?.value || '';
          // Re-render only the table, not the whole page, to keep focus
          const tableEl = document.querySelector('.main-content');
          if (tableEl && appView === 'parts') {
            tableEl.innerHTML = renderPartsTable();
          }
        }, 120);
      }
    });

    // ── Firebase real-time sync ───────────────────────────────────────────
    // Show loading screen while Firebase connects
    document.getElementById('app').insertAdjacentHTML('beforebegin',
      '<div id="loading-screen" class="loading-screen">' +
        '<div class="logo">SERVICE<span>LOG</span></div>' +
        '<div class="loading-spinner"></div>' +
        '<div class="loading-sub">Connecting to database...</div>' +
      '</div>'
    );

    if (!db) {
      // No Firebase - just use localStorage
      fbInitialized = true;
      syncStatus = 'offline';
      const ls = document.getElementById('loading-screen');
      if (ls) ls.remove();
      render();
      updateSyncDot();
    } else {
    db.ref(DB_PATH).once('value')
      .then(function(snapshot) {
        const fbData = snapshot.val();
        if (fbData && fbData.vehicles && fbData.vehicles.length > 0) {
          // Firebase has data — use it and update localStorage
          data = migrateCustomers(migratePhotos(fbData));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } else {
          // Firebase is empty — push our local data up
          db.ref(DB_PATH).set(data);
        }
        fbInitialized = true;
        syncStatus = 'synced';
        const ls = document.getElementById('loading-screen');
        if (ls) ls.remove();
        render();
        updateSyncDot();

        // Listen for changes from other devices
        db.ref(DB_PATH).on('value', function(snap) {
          if (!fbInitialized) return;
          const remote = snap.val();
          if (!remote) return;
          // Only update if data actually changed (avoid echo from our own saves)
          const remoteStr = JSON.stringify(remote);
          const localStr = JSON.stringify(data);
          if (remoteStr !== localStr) {
            data = remote;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            render();
          }
          syncStatus = 'synced';
          updateSyncDot();
        });
      })
      .catch(function() {
        // Offline or error — use localStorage
        fbInitialized = true;
        syncStatus = 'offline';
        const ls = document.getElementById('loading-screen');
        if (ls) ls.remove();
        render();
        updateSyncDot();
      });
    } // end if(db)

    // Sidebar search - use delegated input event on app
    document.getElementById('app').addEventListener('change', function(e) {
      if (e.target.dataset.action === 'report-filter') {
        reportFilters[e.target.dataset.field] = e.target.value;
        render();
        // Re-select the correct option after render
        const sel = document.querySelector('[data-field="'+e.target.dataset.field+'"]');
        if (sel) sel.value = reportFilters[e.target.dataset.field];
      }
    });

    document.getElementById('app').addEventListener('input', function(e) {
      if (e.target.dataset.action === 'report-input') {
        reportFilters[e.target.dataset.field] = e.target.value;
        render();
        // restore focus
        const el = document.querySelector('[data-field="'+e.target.dataset.field+'"]');
        if (el) { el.focus(); el.setSelectionRange && el.setSelectionRange(el.value.length, el.value.length); }
        return;
      }
      if (e.target.dataset.action === 'po-cost-input') {
        const pid = e.target.dataset.id;
        const val = e.target.value;
        const parts = (data.partsToOrder||[]).map(p=>p.id===pid?{...p,unitCost:val}:p);
        data = {...data, partsToOrder:parts};
        saveData(data); // debounced-style: just save, no full re-render
        return;
      }
      if (e.target.dataset.action === 'oh-search') { ohSearch=e.target.value; render(); const el=document.getElementById('oh-search-inp'); if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);} return; }
      if (e.target.dataset.action === 'gs-input') { globalSearch=e.target.value; render(); const el=document.getElementById('gs-input'); if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);} return; }
      if (e.target.id === 'inv-search') {
        window._invSearch = e.target.value;
        render();
        const el = document.getElementById('inv-search');
        if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}
        return;
      }
      if (e.target.id === 'sidebar-search-input') {
        sidebarSearch = e.target.value;
        render();
        // Restore focus and cursor position
        const inp = document.getElementById('sidebar-search-input');
        if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
      }
    });


    // Parts inventory search for service record modal


;


    // Auto-fill part# and cost when user picks from inventory datalist
    document.getElementById('app').addEventListener('input', function(e) {
      if (!e.target.classList || !e.target.classList.contains('part-desc-input')) return;
      const val = e.target.value.trim().toLowerCase();
      if (!val) return;
      const match = (data.partsInventory||[]).find(p=>(p.name||'').toLowerCase()===val);
      if (!match) return;
      const entry = e.target.closest('.part-entry');
      if (!entry) return;
      const numInput  = entry.querySelector('.part-num-input');
      const costInput = entry.querySelector('.part-cost-input');
      if (numInput  && !numInput.value)  numInput.value  = match.num||'';
      if (costInput && !costInput.value) costInput.value = match.unitCost||'';
      entry.dataset.invId = match.id;
    }, true);


    // Custom select handlers — dropdowns rendered at fixed position escape overflow:auto
    let _csOpen = null;

    function csPosition(btn) {
      const dd = document.getElementById('cs-' + btn.dataset.cs);
      if (!dd) return;
      const rect = btn.getBoundingClientRect();
      dd.style.top  = (rect.bottom + 2) + 'px';
      dd.style.left = rect.left + 'px';
      dd.style.minWidth = rect.width + 'px';
      dd.style.display = 'block';
      _csOpen = btn.dataset.cs;
    }

    document.addEventListener('click', function(e) {
      const btn = e.target.closest('[data-action="cs-open"]');
      const pick = e.target.closest('[data-action="cs-pick"]');

      if (pick) {
        poFilters[pick.dataset.field] = pick.dataset.val;
        const dd = document.getElementById('cs-' + pick.dataset.cs);
        if (dd) dd.style.display = 'none';
        _csOpen = null;
        render();
        return;
      }

      if (btn) {
        const dd = document.getElementById('cs-' + btn.dataset.cs);
        if (dd && dd.style.display !== 'none') {
          dd.style.display = 'none';
          _csOpen = null;
        } else {
          // Close any open
          document.querySelectorAll('.cs-dropdown').forEach(d => d.style.display = 'none');
          csPosition(btn);
        }
        return;
      }

      // Click outside — close all
      if (_csOpen) {
        document.querySelectorAll('.cs-dropdown').forEach(d => d.style.display = 'none');
        _csOpen = null;
      }
    });

    window.addEventListener('scroll', function() {
      if (_csOpen) {
        const btn = document.querySelector('[data-action="cs-open"][data-cs="'+_csOpen+'"]');
        if (btn) csPosition(btn);
      }
    }, true);

    // Global photo input handler
    document.getElementById('global-photo-input').addEventListener('change', function() {
      if (!this.files || !this.files[0]) return;
      var file = this.files[0];
      compressImage(file, 800, 600, 0.78).then(function(compressed) {
        pendingPhoto = compressed;
        render();
      });
      this.value = ''; // reset so same file can be picked again
    });
  </script>
</body>
</html>
